apiVersion: v1
kind: Service
metadata:
  name: keycloak-service
  namespace: default
  labels:
    app: keycloak
    component: authentication
    version: v1
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: keycloak

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-service-nodeport
  namespace: default
  labels:
    app: keycloak
    component: authentication
    version: v1
spec:
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30180
    protocol: TCP
    name: http
  selector:
    app: keycloak
