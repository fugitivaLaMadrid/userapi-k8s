apiVersion: v1
kind: Service
metadata:
  name: sonarqube-service
  namespace: default
  labels:
    app: sonarqube
    component: code-quality
    version: v1
spec:
  type: ClusterIP
  ports:
  - port: 9000
    targetPort: 9000
    protocol: TCP
    name: sonarqube
  selector:
    app: sonarqube

---
apiVersion: v1
kind: Service
metadata:
  name: sonarqube-service-nodeport
  namespace: default
  labels:
    app: sonarqube
    component: code-quality
    version: v1
spec:
  type: NodePort
  ports:
  - port: 9000
    targetPort: 9000
    nodePort: 30900
    protocol: TCP
    name: sonarqube
  selector:
    app: sonarqube
