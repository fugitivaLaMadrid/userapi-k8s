apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: default
data:
  init.sql: |
    -- Create roles for all applications
    CREATE ROLE keycloak WITH LOGIN PASSWORD 'keycloak_password';
    CREATE ROLE sonarqube WITH LOGIN PASSWORD 'sonarqube_password';
    
    -- Create databases
    CREATE DATABASE keycloak OWNER keycloak;
    CREATE DATABASE sonarqube OWNER sonarqube;
    
    -- Grant privileges on userapi_db to userapi_user
    GRANT ALL PRIVILEGES ON DATABASE userapi_db TO userapi_user;
    GRANT ALL PRIVILEGES ON SCHEMA public TO userapi_user;
    
    -- Grant privileges on keycloak database
    GRANT ALL PRIVILEGES ON DATABASE keycloak TO keycloak;
    GRANT ALL PRIVILEGES ON SCHEMA public TO keycloak;
    
    -- Grant privileges on sonarqube database
    GRANT ALL PRIVILEGES ON DATABASE sonarqube TO sonarqube;
    GRANT ALL PRIVILEGES ON SCHEMA public TO sonarqube;

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: default
type: Opaque
stringData:
  POSTGRES_USER: userapi_user
  POSTGRES_PASSWORD: userapi_pass
  KEYCLOAK_DB_USER: keycloak
  KEYCLOAK_DB_PASSWORD: keycloak_password
  SONARQUBE_DB_USER: sonarqube
  SONARQUBE_DB_PASSWORD: sonarqube_password

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: default
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "userapi_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-script
          configMap:
            name: postgres-init-script
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
