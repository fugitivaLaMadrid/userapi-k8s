apiVersion: v1
kind: Service
metadata:
  name: userapi-service
  namespace: default
  labels:
    app: userapi
    component: application
    version: v1
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: userapi

---
apiVersion: v1
kind: Service
metadata:
  name: userapi-service-nodeport
  namespace: default
  labels:
    app: userapi
    component: application
    version: v1
spec:
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
    protocol: TCP
    name: http
  selector:
    app: userapi
