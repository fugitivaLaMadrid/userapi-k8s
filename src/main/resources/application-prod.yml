# Production configuration - hardened settings
spring:
  application:
    name: userapi

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:userdb}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate  # Only validate schema, don't modify
    defer-datasource-initialization: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  sql:
    init:
      mode: never

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI}

# actuator - limited exposure in production
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized
      show-components: never
  info:
    env:
      enabled: false
  metrics:
    export:
      prometheus:
        enabled: true

info:
  app:
    name: userapi
    version: 1.0.0
    description: User Management REST API
    java-version: 17

# swagger - disabled in production
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Logging configuration for production
logging:
  level:
    com.fugitivalamadrid.api.userapi: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
